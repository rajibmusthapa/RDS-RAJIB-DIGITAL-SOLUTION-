<!DOCTYPE html>
<html>
<head>
    <title>Admin Login - RDS</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { font-family: Arial; background: #0f172a; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: #1e293b; padding: 40px; border-radius: 12px; width: 350px; }
        h2 { color: #3b82f6; text-align: center; }
        input { width: 100%; padding: 12px; margin: 10px 0; background: #334155; border: 1px solid #475569; color: white; border-radius: 6px; }
        button { width: 100%; padding: 12px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer; }
        .error { color: #ef4444; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>🔐 RDS Admin Login</h2>
    <input type="password" id="password" placeholder="Password" onkeypress="if(event.key==='Enter') login()">
    <button onclick="login()">Login</button>
    <div id="error" class="error"></div>
</div>
<script>
    async function login() {
        const password = document.getElementById('password').value;
        const res = await fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ password })
        });
        const data = await res.json();
        if (data.status === 'success') {
            localStorage.setItem('adminToken', data.token);
            window.location.href = '/admin/dashboard.html';
        } else {
            document.getElementById('error').textContent = 'Password salah!';
        }
    }
</script>
</body>
</html>
