<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>RDS Admin Panel</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f172a; color: #fff; }
        .sidebar { width: 260px; background: #1e293b; height: 100vh; position: fixed; left: 0; top: 0; padding: 20px; overflow-y: auto; transition: left 0.3s; z-index: 1000; }
        .main { margin-left: 260px; padding: 20px; }
        .logo { font-size: 24px; font-weight: bold; color: #3b82f6; margin-bottom: 30px; }
        .nav-item { padding: 12px 16px; margin: 4px 0; border-radius: 8px; cursor: pointer; }
        .nav-item:hover, .nav-item.active { background: #334155; }
        .menu-toggle { display: none; position: fixed; top: 10px; left: 10px; z-index: 1001; background: #3b82f6; padding: 10px 15px; border-radius: 8px; cursor: pointer; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-card { background: #1e293b; padding: 20px; border-radius: 12px; border: 1px solid #334155; }
        .stat-value { font-size: 32px; font-weight: bold; color: #3b82f6; margin-top: 10px; }
        .section { background: #1e293b; border-radius: 12px; padding: 20px; margin-bottom: 20px; overflow-x: auto; }
        .section-title { font-size: 20px; margin-bottom: 20px; border-bottom: 1px solid #334155; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #0f172a; }
        .status-pending { background: #f59e0b; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .status-paid { background: #10b981; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        button { background: #3b82f6; color: white; border: none; padding: 8px 16px; border-radius: 6px; cursor: pointer; }
        button.danger { background: #ef4444; }
        select { background: #334155; color: white; padding: 6px 12px; border: 1px solid #475569; border-radius: 6px; }
        .toast { position: fixed; bottom: 20px; right: 20px; background: #10b981; padding: 12px 24px; border-radius: 8px; display: none; z-index: 1003; }
        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            .sidebar { left: -260px; }
            .sidebar.open { left: 0; }
            .main { margin-left: 0; padding-top: 60px; }
            .stats-grid { grid-template-columns: repeat(2, 1fr); gap: 10px; }
        }
    </style>
</head>
<body>
<div class="menu-toggle" onclick="toggleSidebar()">☰ Menu</div>
<div class="sidebar" id="sidebar">
    <div class="logo">🚀 RDS ULTIMATE</div>
    <div class="nav-item active" data-page="dashboard">📊 Dashboard</div>
    <div class="nav-item" data-page="bookings">📅 Bookings</div>
    <div class="nav-item" data-page="messages">💬 Messages</div>
    <div class="nav-item" data-page="blog">📝 Blog Manager</div>
    <div class="nav-item" data-page="portfolio">🎨 Portfolio</div>
    <div class="nav-item" data-page="orders">🛒 Orders</div>
    <div class="nav-item" data-page="settings">⚙️ Settings</div>
    <div class="nav-item" id="logoutBtn" style="color: #ef4444;">🚪 Logout</div>
</div>
<div class="main">
    <div id="dashboardPage">
        <div class="stats-grid" id="statsGrid"></div>
        <div class="section">
            <div class="section-title">📋 Booking Terbaru</div>
            <div id="recentBookings"></div>
        </div>
    </div>
    <div id="bookingsPage" style="display:none;">
        <div class="section">
            <div class="section-title">📅 Semua Booking</div>
            <button onclick="exportCSV()">📥 Export CSV</button>
            <input type="text" id="searchInput" placeholder="Cari booking..." style="margin: 15px 0; padding: 10px; width: 100%; max-width: 300px;">
            <div id="allBookings"></div>
        </div>
    </div>
    <div id="messagesPage" style="display:none;">
        <div class="section">
            <div class="section-title">💬 Semua Pesan</div>
            <div id="allMessages"></div>
        </div>
    </div>
    <div id="blogPage" style="display:none;">
        <div class="section">
            <div class="section-title">📝 Blog Posts</div>
            <button onclick="showBlogModal()">+ Tambah Artikel</button>
            <div id="blogList" style="margin-top: 20px;"></div>
        </div>
    </div>
    <div id="portfolioPage" style="display:none;">
        <div class="section">
            <div class="section-title">🎨 Portfolio</div>
            <button onclick="showPortfolioModal()">+ Tambah Project</button>
            <div id="portfolioList" style="margin-top: 20px;"></div>
        </div>
    </div>
    <div id="ordersPage" style="display:none;">
        <div class="section">
            <div class="section-title">🛒 Semua Pesanan</div>
            <div id="ordersList"></div>
        </div>
    </div>
    <div id="settingsPage" style="display:none;">
        <div class="section">
            <div class="section-title">⚙️ Pengaturan</div>
            <div class="stat-card"><h3>💾 Backup Data</h3><button onclick="backupData()">Download Backup</button></div>
        </div>
    </div>
</div>
<div id="toast" class="toast"></div>

<!-- Modal -->
<div id="blogModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1002;">
    <div style="background:#1e293b; padding:30px; border-radius:12px; width:90%; max-width:500px;">
        <h3>Tambah Artikel</h3>
        <input type="text" id="blogTitle" placeholder="Judul" style="width:100%; padding:10px; margin:10px 0; background:#334155; border:none; color:white;">
        <input type="text" id="blogAuthor" placeholder="Penulis" style="width:100%; padding:10px; margin:10px 0; background:#334155; border:none; color:white;">
        <textarea id="blogContent" rows="5" placeholder="Konten..." style="width:100%; padding:10px; background:#334155; border:none; color:white;"></textarea>
        <button onclick="saveBlog()">Simpan</button>
        <button onclick="closeModal('blogModal')">Batal</button>
    </div>
</div>

<script>
let currentToken = localStorage.getItem('adminToken');

function showToast(msg, isError = false) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.style.background = isError ? '#ef4444' : '#10b981';
    toast.style.display = 'block';
    setTimeout(() => toast.style.display = 'none', 3000);
}

function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('open');
}

async function apiCall(endpoint, method = 'GET', data = null) {
    const headers = { 'Content-Type': 'application/json' };
    if (currentToken) headers['Authorization'] = `Bearer ${currentToken}`;
    const options = { method, headers };
    if (data) options.body = JSON.stringify(data);
    const res = await fetch(endpoint, options);
    if (res.status === 401) {
        window.location.href = '/admin/login.html';
        return null;
    }
    return res.json();
}

function formatPrice(price) {
    return 'Rp' + (price || 0).toLocaleString('id-ID');
}

async function loadStats() {
    const bookings = await apiCall('/api/bookings');
    const orders = await apiCall('/api/orders');
    const messages = await apiCall('/api/messages');
    
    const totalRevenue = orders?.reduce((sum, o) => sum + (o.status === 'paid' ? o.total : 0), 0) || 0;
    
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card"><h3>Total Booking</h3><div class="stat-value">${bookings?.length || 0}</div></div>
        <div class="stat-card"><h3>Total Orders</h3><div class="stat-value">${orders?.length || 0}</div></div>
        <div class="stat-card"><h3>Total Revenue</h3><div class="stat-value">${formatPrice(totalRevenue)}</div></div>
        <div class="stat-card"><h3>Total Pesan</h3><div class="stat-value">${messages?.length || 0}</div></div>
    `;
}

async function loadRecentBookings() {
    const bookings = await apiCall('/api/bookings');
    if (!bookings || bookings.length === 0) {
        document.getElementById('recentBookings').innerHTML = '<p>Belum ada booking</p>';
        return;
    }
    let html = '<table><thead><tr><th>Nama</th><th>Service</th><th>Status</th><th>Tanggal</th></tr></thead><tbody>';
    bookings.slice(-5).reverse().forEach(b => {
        html += `<tr><td>${b.name}</td><td>${b.service}</td><td class="status-${b.status}">${b.status}</td><td>${b.date || '-'}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('recentBookings').innerHTML = html;
}

async function loadAllBookings() {
    const bookings = await apiCall('/api/bookings');
    if (!bookings || bookings.length === 0) {
        document.getElementById('allBookings').innerHTML = '<p>Belum ada booking</p>';
        return;
    }
    let html = '<table><thead><tr><th>Nama</th><th>Email</th><th>Service</th><th>Status</th><th>Aksi</th></tr></thead><tbody>';
    bookings.forEach(b => {
        html += `<tr>
            <td>${b.name}</td>
            <td>${b.email}</td>
            <td>${b.service}</td>
            <td><select onchange="updateStatus(${b.id}, this.value)">
                <option ${b.status === 'pending' ? 'selected' : ''}>pending</option>
                <option ${b.status === 'confirmed' ? 'selected' : ''}>confirmed</option>
                <option ${b.status === 'completed' ? 'selected' : ''}>completed</option>
            </select></td>
            <td><button class="danger" onclick="deleteBooking(${b.id})">Hapus</button></td>
        </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('allBookings').innerHTML = html;
}

async function loadOrders() {
    const orders = await apiCall('/api/orders');
    console.log('Orders data:', orders);
    
    if (!orders || orders.length === 0) {
        document.getElementById('ordersList').innerHTML = '<p>Belum ada pesanan</p>';
        return;
    }
    
    let html = '<table><thead><tr><th>Order ID</th><th>Customer</th><th>Items</th><th>Total</th><th>Status</th><th>Tanggal</th></tr></thead><tbody>';
    orders.forEach(o => {
        html += `<tr>
            <td>${o.order_id}</td>
            <td>${o.customer?.name || '-'}<br><small>${o.customer?.email || '-'}</small></td>
            <td>${o.items?.map(i => `${i.name} x${i.quantity}`).join(', ') || '-'}</td>
            <td>${formatPrice(o.total)}</td>
            <td><select onchange="updateOrderStatus(${o.id}, this.value)">
                <option ${o.status === 'pending' ? 'selected' : ''}>pending</option>
                <option ${o.status === 'paid' ? 'selected' : ''}>paid</option>
                <option ${o.status === 'completed' ? 'selected' : ''}>completed</option>
            </select></td>
            <td>${new Date(o.created_at).toLocaleDateString()}</td>
        </tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('ordersList').innerHTML = html;
}

async function loadAllMessages() {
    const messages = await apiCall('/api/messages');
    if (!messages || messages.length === 0) {
        document.getElementById('allMessages').innerHTML = '<p>Belum ada pesan</p>';
        return;
    }
    let html = '<table><thead><tr><th>Nama</th><th>Email</th><th>Pesan</th><th>Tanggal</th></tr></thead><tbody>';
    messages.forEach(m => {
        html += `<tr><td>${m.name}</td><td>${m.email}</td><td>${m.message}</td><td>${new Date(m.created_at).toLocaleDateString()}</td></tr>`;
    });
    html += '</tbody></table>';
    document.getElementById('allMessages').innerHTML = html;
}

async function loadBlog() {
    const blogs = await apiCall('/api/blog');
    if (!blogs || blogs.length === 0) {
        document.getElementById('blogList').innerHTML = '<p>Belum ada artikel</p>';
        return;
    }
    let html = '';
    blogs.forEach(b => {
        html += `<div class="stat-card"><h3>${b.title}</h3><small>By ${b.author}</small><p>${b.content.substring(0,100)}...</p><button class="danger" onclick="deleteBlog(${b.id})">Hapus</button></div>`;
    });
    document.getElementById('blogList').innerHTML = html;
}

async function loadPortfolio() {
    const portfolios = await apiCall('/api/portfolio');
    if (!portfolios || portfolios.length === 0) {
        document.getElementById('portfolioList').innerHTML = '<p>Belum ada portfolio</p>';
        return;
    }
    let html = '';
    portfolios.forEach(p => {
        html += `<div class="stat-card"><h3>${p.title}</h3><p>${p.category} | ${p.client}</p><button class="danger" onclick="deletePortfolio(${p.id})">Hapus</button></div>`;
    });
    document.getElementById('portfolioList').innerHTML = html;
}

async function updateStatus(id, status) {
    await apiCall('/api/update-booking', 'POST', { id, status });
    showToast('Status updated!');
    loadAllBookings();
    loadStats();
    loadRecentBookings();
}

async function updateOrderStatus(id, status) {
    await apiCall('/api/update-order', 'POST', { id, status });
    showToast('Order status updated!');
    loadOrders();
    loadStats();
}

async function deleteBooking(id) {
    if (confirm('Hapus booking ini?')) {
        await apiCall('/api/delete-booking', 'POST', { id });
        showToast('Deleted!');
        loadAllBookings();
        loadStats();
        loadRecentBookings();
    }
}

async function saveBlog() {
    const title = document.getElementById('blogTitle').value;
    const author = document.getElementById('blogAuthor').value;
    const content = document.getElementById('blogContent').value;
    if (!title || !content) { showToast('Isi semua field!', true); return; }
    await apiCall('/api/blog', 'POST', { action: 'create', title, author, content });
    showToast('Artikel published!');
    closeModal('blogModal');
    loadBlog();
}

async function savePortfolio() {
    const title = document.getElementById('portfolioTitle').value;
    const category = document.getElementById('portfolioCategory').value;
    const client = document.getElementById('portfolioClient').value;
    const description = document.getElementById('portfolioDesc').value;
    if (!title) { showToast('Isi nama project!', true); return; }
    await apiCall('/api/portfolio', 'POST', { action: 'create', title, category, client, description });
    showToast('Project added!');
    closeModal('portfolioModal');
    loadPortfolio();
}

async function deleteBlog(id) {
    if (confirm('Hapus artikel?')) {
        await apiCall('/api/blog', 'POST', { action: 'delete', id });
        showToast('Artikel dihapus!');
        loadBlog();
    }
}

async function deletePortfolio(id) {
    if (confirm('Hapus portfolio?')) {
        await apiCall('/api/portfolio', 'POST', { action: 'delete', id });
        showToast('Portfolio dihapus!');
        loadPortfolio();
    }
}

async function exportCSV() {
    window.open('/api/export/csv', '_blank');
}

async function backupData() {
    const bookings = await apiCall('/api/bookings');
    const orders = await apiCall('/api/orders');
    const backup = { bookings, orders, date: new Date().toISOString() };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `rds-backup-${new Date().toISOString().split('T')[0]}.json`;
    a.click();
    URL.revokeObjectURL(url);
    showToast('Backup downloaded!');
}

function showBlogModal() { document.getElementById('blogModal').style.display = 'flex'; }
function showPortfolioModal() { document.getElementById('portfolioModal').style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

// Navigasi
document.querySelectorAll('.nav-item[data-page]').forEach(item => {
    item.addEventListener('click', () => {
        const page = item.dataset.page;
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        item.classList.add('active');
        document.querySelectorAll('[id$="Page"]').forEach(p => p.style.display = 'none');
        document.getElementById(page + 'Page').style.display = 'block';
        
        if (page === 'dashboard') { loadStats(); loadRecentBookings(); }
        else if (page === 'bookings') loadAllBookings();
        else if (page === 'messages') loadAllMessages();
        else if (page === 'blog') loadBlog();
        else if (page === 'portfolio') loadPortfolio();
        else if (page === 'orders') loadOrders();
        
        if (window.innerWidth <= 768) document.getElementById('sidebar').classList.remove('open');
    });
});

document.getElementById('logoutBtn')?.addEventListener('click', () => {
    localStorage.removeItem('adminToken');
    window.location.href = '/admin/login.html';
});

document.getElementById('searchInput')?.addEventListener('input', () => loadAllBookings());

if (!currentToken) {
    window.location.href = '/admin/login.html';
} else {
    loadStats();
    loadRecentBookings();
}
</script>

<div id="portfolioModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); justify-content:center; align-items:center; z-index:1002;">
    <div style="background:#1e293b; padding:30px; border-radius:12px; width:90%; max-width:500px;">
        <h3>Tambah Project</h3>
        <input type="text" id="portfolioTitle" placeholder="Nama Project" style="width:100%; padding:10px; margin:10px 0; background:#334155; border:none; color:white;">
        <input type="text" id="portfolioCategory" placeholder="Kategori" style="width:100%; padding:10px; margin:10px 0; background:#334155; border:none; color:white;">
        <input type="text" id="portfolioClient" placeholder="Client" style="width:100%; padding:10px; margin:10px 0; background:#334155; border:none; color:white;">
        <textarea id="portfolioDesc" rows="3" placeholder="Deskripsi" style="width:100%; padding:10px; background:#334155; border:none; color:white;"></textarea>
        <button onclick="savePortfolio()">Simpan</button>
        <button onclick="closeModal('portfolioModal')">Batal</button>
    </div>
</div>
</body>
</html>
<script>
// ========== NOTIFIKASI BROWSER ==========
let lastBookingCount = 0;

// Minta izin notifikasi
if ("Notification" in window) {
    Notification.requestPermission();
}

async function cekNotifikasi() {
    const stats = await apiCall('/api/stats');
    if (stats && stats.total_bookings > lastBookingCount && lastBookingCount > 0) {
        const newCount = stats.total_bookings - lastBookingCount;
        if (Notification.permission === "granted") {
            new Notification("📢 Booking Baru!", {
                body: `Ada ${newCount} booking baru masuk!`,
                icon: "https://cdn-icons-png.flaticon.com/512/190/190411.png",
                vibrate: [200, 100, 200]
            });
        }
        showToast(`📢 ${newCount} booking baru!`, false);
    }
    lastBookingCount = stats?.total_bookings || 0;
}

// Cek notifikasi setiap 30 detik
setInterval(cekNotifikasi, 30000);

// ========== AUTO LOGOUT (30 menit tidak aktif) ==========
let logoutTimer;
function resetLogoutTimer() {
    clearTimeout(logoutTimer);
    logoutTimer = setTimeout(() => {
        localStorage.removeItem('adminToken');
        window.location.href = '/admin/login.html';
    }, 30 * 60 * 1000);
}

window.onload = resetLogoutTimer;
document.onmousemove = resetLogoutTimer;
document.onkeypress = resetLogoutTimer;
document.onclick = resetLogoutTimer;
document.onscroll = resetLogoutTimer;

// ========== UPDATE LAST BOOKING COUNT ==========
setTimeout(() => { cekNotifikasi(); }, 5000);
</script>
