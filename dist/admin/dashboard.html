<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard - RDS</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #0f172a; color: #fff; padding: 20px; }
        h1 { color: #3b82f6; margin-bottom: 20px; }
        table { width: 100%; border-collapse: collapse; background: #1e293b; border-radius: 12px; overflow-x: auto; display: block; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #334155; }
        th { background: #0f172a; }
        .status { padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .status-pending { background: #f59e0b; }
        .status-confirmed { background: #10b981; }
        .status-completed { background: #3b82f6; }
        .login-box { max-width: 400px; margin: 100px auto; background: #1e293b; padding: 30px; border-radius: 12px; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: none; }
        button { background: #3b82f6; color: white; cursor: pointer; }
        button.danger { background: #ef4444; }
        .container { overflow-x: auto; }
        @media (max-width: 768px) { th, td { font-size: 12px; padding: 8px; } }
    </style>
</head>
<body>
<div id="loginDiv">
    <div class="login-box">
        <h2 style="text-align:center">🔐 Admin Login</h2>
        <input type="password" id="password" placeholder="Password" onkeypress="if(event.key==='Enter') login()">
        <button onclick="login()">Login</button>
        <div id="error" style="color:#ef4444; text-align:center; margin-top:10px"></div>
    </div>
</div>
<div id="dashboardDiv" style="display:none">
    <h1>📊 RDS Admin Dashboard</h1>
    <div class="container">
        <table id="bookingsTable">
            <thead><tr><th>ID</th><th>Nama</th><th>Email</th><th>Phone</th><th>Service</th><th>Status</th><th>Tanggal</th><th>Aksi</th></tr></thead>
            <tbody id="bookingsBody"></tbody>
        </table>
    </div>
    <button onclick="logout()" style="margin-top:20px; background:#ef4444; width:auto; padding:10px 20px;">Logout</button>
</div>
<script>
const SUPABASE_URL = 'https://rxavqieahctcoumxdsuy.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_Om2bBc8abrILDagNByy2ZQ_qhyrVntD';

async function login() {
    const password = document.getElementById('password').value;
    if (password === 'admin123') {
        localStorage.setItem('adminAuth', 'true');
        document.getElementById('loginDiv').style.display = 'none';
        document.getElementById('dashboardDiv').style.display = 'block';
        loadBookings();
    } else {
        document.getElementById('error').innerText = 'Password salah!';
    }
}

async function loadBookings() {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/bookings?select=*&order=id.desc`, {
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
    });
    const bookings = await response.json();
    const tbody = document.getElementById('bookingsBody');
    tbody.innerHTML = bookings.map(b => `
        <tr>
            <td>${b.id}</td>
            <td>${b.name || '-'}</td>
            <td>${b.email || '-'}</td>
            <td>${b.phone || '-'}</td>
            <td>${b.service || '-'}</td>
            <td><select onchange="updateStatus(${b.id}, this.value)" class="status status-${b.status}"><option ${b.status === 'pending' ? 'selected' : ''} value="pending">pending</option><option ${b.status === 'confirmed' ? 'selected' : ''} value="confirmed">confirmed</option><option ${b.status === 'completed' ? 'selected' : ''} value="completed">completed</option></select></td>
            <td>${b.created_at ? new Date(b.created_at).toLocaleDateString() : '-'}</td>
            <td><button onclick="deleteBooking(${b.id})" style="background:#ef4444; padding:5px 10px;">Hapus</button></td>
        </tr>
    `).join('');
}

async function updateStatus(id, status) {
    await fetch(`${SUPABASE_URL}/rest/v1/bookings?id=eq.${id}`, {
        method: 'PATCH',
        headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({ status })
    });
    loadBookings();
}

async function deleteBooking(id) {
    if (confirm('Yakin hapus booking ini?')) {
        await fetch(`${SUPABASE_URL}/rest/v1/bookings?id=eq.${id}`, {
            method: 'DELETE',
            headers: { 'apikey': SUPABASE_ANON_KEY, 'Authorization': `Bearer ${SUPABASE_ANON_KEY}` }
        });
        loadBookings();
    }
}

function logout() { localStorage.removeItem('adminAuth'); location.reload(); }

if (localStorage.getItem('adminAuth') === 'true') {
    document.getElementById('loginDiv').style.display = 'none';
    document.getElementById('dashboardDiv').style.display = 'block';
    loadBookings();
}
</script>
</body>
</html>
